[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "whispr-flow-linux"
version = "0.1.0"
description = "Local-first Linux dictation app with Whisper transcription and smart formatting."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Whispr Flow Linux contributors" }]
dependencies = [
  "requests>=2.31",
]

[project.optional-dependencies]
whisper = [
  "faster-whisper>=1.0",
]
recording = [
  "sounddevice>=0.4",
  "soundfile>=0.12",
]
dev = [
  "pytest>=8.0",
]

[project.scripts]
whispr-flow = "whispr_flow_linux.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

